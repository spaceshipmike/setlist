appId: com.setlist.app
productName: Setlist
directories:
  buildResources: build
  output: dist
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!e2e/*'
  - '!electron.vite.config.*'
  - '!{tsconfig*.json,biome.json}'
asarUnpack:
  - node_modules/better-sqlite3/**
mac:
  target:
    # dmg is what humans download for first install; zip is what
    # electron-updater downloads to apply an update in-place.
    # Both go into the GitHub Release; latest-mac.yml points at the zip.
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
  # Notarization + hardened runtime are mandatory for the auto-update path
  # (#hard-constraints §4.3). Without notarization, macOS quarantines the
  # downloaded update and the Squirrel.Mac handoff fails Gatekeeper checks.
  notarize: true
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
publish:
  provider: github
  owner: spaceshipmike
  repo: setlist
  releaseType: release
